<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Dashboard</title>

    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
</head>

<body>
<div class="container">

    <header>
        <h1>MT5 Trading Dashboard</h1>
        <div id="last-update">Loading...</div>
    </header>

    <!-- ACCOUNT -->
    <section class="account-summary">
        <h2>Account Summary</h2>

        <div class="metrics-grid">

            <div class="metric-card">
                <div class="metric-label">Balance</div>
                <div class="metric-value" id="balance">0</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Profit / Loss</div>
                <div class="metric-value" id="profit">0</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Avg Profit</div>
                <div class="metric-value" id="avg-profit">0</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Avg Loss</div>
                <div class="metric-value" id="avg-loss">0</div>
            </div>

            <div class="metric-card">
                <div class="metric-label">Avg Trade Duration</div>
                <div class="metric-value" id="avg-duration">0</div>
            </div>

        </div>
    </section>

    <!-- MONTHLY STATUS (renamed chart section) -->
    <section class="charts">
        <h2>Monthly Status</h2>
        <div class="chart-container">
            <canvas id="chart-xauusd"></canvas>
        </div>
    </section>

</div>

<script src="js/main.js"></script>
<script src="js/charts.js"></script>
</body>
</html>

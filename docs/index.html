<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT5 Trading Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>MT5 Trading Dashboard</h1>
            <div id="last-update">Last Update: Loading...</div>
        </header>

        <!-- Account Summary -->
        <section class="account-summary">
            <h2>Account Summary</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Balance</div>
                    <div class="metric-value" id="balance">$0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Equity</div>
                    <div class="metric-value" id="equity">$0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Profit</div>
                    <div class="metric-value" id="profit">$0.00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Margin Level</div>
                    <div class="metric-value" id="margin-level">0%</div>
                </div>
            </div>
        </section>

        <!-- Open Positions -->
        <section class="positions">
            <h2>Open Positions</h2>
            <div id="positions-table"></div>
        </section>

        <!-- Charts -->
        <section class="charts">
            <h2>Price Charts</h2>
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>XAUUSD</h3>
                    <canvas id="chart-xauusd"></canvas>
                </div>
                <div class="chart-container">
                    <h3>EURUSD</h3>
                    <canvas id="chart-eurusd"></canvas>
                </div>
                <div class="chart-container">
                    <h3>GBPUSD</h3>
                    <canvas id="chart-gbpusd"></canvas>
                </div>
            </div>
        </section>
    </div>

    <script src="js/main.js"></script>
    <script src="js/charts.js"></script>
</body>
</html>
